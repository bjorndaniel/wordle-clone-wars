# Deploy to Azure Web App (Linux, B1) + Azure Database for PostgreSQL Flexible Server
# Required secrets:
#   AZURE_CREDENTIALS          - Service principal JSON from: az ad sp create-for-rbac --sdk-auth
#   AZURE_POSTGRESQL_CONNECTION_STRING - Npgsql connection string, e.g.:
#                                  Host=<server>.postgres.database.azure.com;Port=5432;
#                                  Database=WordleCloneWars;Username=<user>;Password=<pass>;SslMode=Require
#   EMAIL_API_KEY              - SendGrid API key
#   FROM_EMAIL                 - Sender email address
#   SYNCFUSION_KEY             - Syncfusion license key
# Migrations run automatically on startup via SeedData.EnsureSeedDataAsync -> context.Database.MigrateAsync()

name: Build and deploy to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  APP_NAME: 'wordle-clone-wars'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ./src/WordleCloneWars.sln

      - name: Build
        run: dotnet build ./src/WordleCloneWars/WordleCloneWars.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test ./src/WordleCloneWars.Tests/WordleCloneWars.Tests.csproj --configuration Release --no-build

      - name: Publish
        run: dotnet publish ./src/WordleCloneWars/WordleCloneWars.csproj --configuration Release --output ./publish

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions: {}
    environment:
      name: Production
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app
          path: ./publish

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure App Settings and Connection Strings
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ env.APP_NAME }}
          connection-strings-json: |
            [
              {
                "name": "DefaultConnection",
                "value": "${{ secrets.AZURE_POSTGRESQL_CONNECTION_STRING }}",
                "type": "PostgreSQL",
                "slotSetting": false
              }
            ]
          app-settings-json: |
            [
              { "name": "EmailSettings__ApiKey", "value": "${{ secrets.EMAIL_API_KEY }}", "slotSetting": false },
              { "name": "EmailSettings__FromEmail", "value": "${{ secrets.FROM_EMAIL }}", "slotSetting": false },
              { "name": "SyncfusionKey", "value": "${{ secrets.SYNCFUSION_KEY }}", "slotSetting": false }
            ]

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          slot-name: Production
          package: ./publish
