# Deploy to Azure Web App (Free tier) + Azure Database for PostgreSQL Flexible Server
# Required secrets:
#   AZURE_CREDENTIALS          - Service principal JSON from: az ad sp create-for-rbac --sdk-auth
#   AZURE_POSTGRES_ADMIN_PASSWORD - PostgreSQL admin password used by infra/main.bicep
#   EMAIL_API_KEY              - SendGrid API key
#   FROM_EMAIL                 - Sender email address
#   SYNCFUSION_KEY             - Syncfusion license key
# Migrations run automatically on startup via SeedData.EnsureSeedDataAsync -> context.Database.MigrateAsync()

name: Build and deploy to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: "10.0.x"
  RESOURCE_GROUP: "wordle-clone-wars-rg"
  LOCATION: "westeurope"
  DEPLOYMENT_NAME: "wordle-clone-wars-infra"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ./src/WordleCloneWars.sln

      - name: Build
        run: dotnet build ./src/WordleCloneWars.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ./src/WordleCloneWars.Tests/WordleCloneWars.Tests.csproj
          --configuration Release --no-build --no-restore

      - name: Publish
        run: dotnet publish ./src/WordleCloneWars/WordleCloneWars.csproj --configuration
          Release --output ./publish

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions: {}
    environment:
      name: Production
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app
          path: ./publish

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure resource group exists
        run: |
          az group create \
            --name "$RESOURCE_GROUP" \
            --location "$LOCATION"

      - name: Deploy infrastructure (Bicep)
        run: |
          az deployment group create \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --template-file ./infra/main.bicep \
            --parameters @./infra/main.parameters.json \
            --parameters postgresAdminPassword="${{ secrets.AZURE_POSTGRES_ADMIN_PASSWORD }}"

      - name: Read infrastructure outputs
        id: infra
        shell: bash
        run: |
          WEB_APP_NAME=$(az deployment group show \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.outputs.webAppName.value" -o tsv)

          POSTGRES_FQDN=$(az deployment group show \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.outputs.postgresFqdn.value" -o tsv)

          POSTGRES_DB=$(az deployment group show \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.outputs.postgresDatabaseName.value" -o tsv)

          POSTGRES_USER=$(az deployment group show \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.outputs.postgresAdminUsername.value" -o tsv)

          CONNECTION_STRING="Host=${POSTGRES_FQDN};Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${{ secrets.AZURE_POSTGRES_ADMIN_PASSWORD }};Ssl Mode=Require;Trust Server Certificate=true"

          echo "web_app_name=$WEB_APP_NAME" >> "$GITHUB_OUTPUT"
          echo "postgres_connection_string=$CONNECTION_STRING" >> "$GITHUB_OUTPUT"

      - name: Configure App Settings and Connection Strings
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ steps.infra.outputs.web_app_name }}
          connection-strings-json: |
            [
              {
                "name": "DefaultConnection",
                "value": "${{ steps.infra.outputs.postgres_connection_string }}",
                "type": "PostgreSQL",
                "slotSetting": false
              }
            ]
          app-settings-json: |
            [
              { "name": "EmailSettings__ApiKey", "value": "${{ secrets.EMAIL_API_KEY }}", "slotSetting": false },
              { "name": "EmailSettings__FromEmail", "value": "${{ secrets.FROM_EMAIL }}", "slotSetting": false },
              { "name": "SyncfusionKey", "value": "${{ secrets.SYNCFUSION_KEY }}", "slotSetting": false }
            ]

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ steps.infra.outputs.web_app_name }}
          slot-name: Production
          package: ./publish
