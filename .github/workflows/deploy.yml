# Deploy to Azure Web App (Free tier) + Azure SQL Database (free offer)
# Required secrets:
#   AZURE_CREDENTIALS         - Service principal JSON from: az ad sp create-for-rbac --sdk-auth
#   AZURE_SQL_ADMIN_PASSWORD  - Azure SQL admin password used by infra/main.bicep
#   SMTP_USER                 - Loopia mailbox address used to authenticate
#   SMTP_PASSWORD             - Loopia mailbox password
#   FROM_EMAIL                - Sender email address (usually same as SMTP_USER)
# Migrations run automatically on startup via SeedData.EnsureSeedDataAsync -> context.Database.MigrateAsync()

name: Build and deploy to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: "10.0.x"
  RESOURCE_GROUP: "wordle-clone-wars-rg"
  LOCATION: "westeurope"
  DEPLOYMENT_NAME: "wordle-clone-wars-infra"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore ./src/WordleCloneWars.sln

      - name: Build
        run: dotnet build ./src/WordleCloneWars.sln --configuration Release --no-restore

      - name: Test
        run:
          dotnet test ./src/WordleCloneWars.Tests/WordleCloneWars.Tests.csproj
          --configuration Release --no-build --no-restore

      - name: Publish
        run:
          dotnet publish ./src/WordleCloneWars/WordleCloneWars.csproj --configuration
          Release --output ./publish

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions: {}
    environment:
      name: Production
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - uses: actions/checkout@v4

      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app
          path: ./publish

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure resource group exists
        run: |
          az group create \
            --name "$RESOURCE_GROUP" \
            --location "$LOCATION"

      - name: Deploy infrastructure (Bicep)
        run: |
          az deployment group create \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --template-file ./infra/main.bicep \
            --parameters @./infra/main.parameters.json \
            --parameters sqlAdminPassword="${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}"

      # Removes the legacy Azure Database for PostgreSQL flexible server left over
      # from the pre-Azure-SQL deployment. Safe to run repeatedly: a no-op if the
      # resource has already been deleted manually.
      - name: Teardown legacy PostgreSQL server
        run: |
          IDS=$(az resource list \
            --resource-group "$RESOURCE_GROUP" \
            --resource-type "Microsoft.DBforPostgreSQL/flexibleServers" \
            --query "[].id" -o tsv)
          if [ -z "$IDS" ]; then
            echo "No legacy PostgreSQL servers found — nothing to remove."
          else
            echo "Removing legacy PostgreSQL servers:"
            echo "$IDS"
            az resource delete --ids $IDS
          fi

      - name: Read infrastructure outputs
        id: infra
        shell: bash
        run: |
          WEB_APP_NAME=$(az deployment group show \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.outputs.webAppName.value" -o tsv)

          SQL_FQDN=$(az deployment group show \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.outputs.sqlServerFqdn.value" -o tsv)

          SQL_DB=$(az deployment group show \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.outputs.sqlDatabaseName.value" -o tsv)

          SQL_USER=$(az deployment group show \
            --name "$DEPLOYMENT_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.outputs.sqlAdminUsername.value" -o tsv)

          CONNECTION_STRING="Server=tcp:${SQL_FQDN},1433;Initial Catalog=${SQL_DB};Persist Security Info=False;User ID=${SQL_USER};Password=${{ secrets.AZURE_SQL_ADMIN_PASSWORD }};MultipleActiveResultSets=True;Encrypt=True;TrustServerCertificate=False;Connection Timeout=60;"

          echo "web_app_name=$WEB_APP_NAME" >> "$GITHUB_OUTPUT"
          echo "::add-mask::$CONNECTION_STRING"
          echo "sql_connection_string=$CONNECTION_STRING" >> "$GITHUB_OUTPUT"

      - name: Configure App Settings and Connection Strings
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ steps.infra.outputs.web_app_name }}
          connection-strings-json: |
            [
              {
                "name": "DefaultConnection",
                "value": "${{ steps.infra.outputs.sql_connection_string }}",
                "type": "SQLAzure",
                "slotSetting": false
              }
            ]
          app-settings-json: |
            [
              { "name": "EmailSettings__SmtpUser", "value": "${{ secrets.SMTP_USER }}", "slotSetting": false },
              { "name": "EmailSettings__SmtpPassword", "value": "${{ secrets.SMTP_PASSWORD }}", "slotSetting": false },
              { "name": "EmailSettings__FromEmail", "value": "${{ secrets.FROM_EMAIL }}", "slotSetting": false }
            ]

      - name: Zip publish output
        run: cd ./publish && zip -r ../publish.zip .

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ steps.infra.outputs.web_app_name }}
          slot-name: Production
          package: ./publish.zip
